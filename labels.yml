- name: "type: bug"
  color: "d73a4a"
  description: "Something isn't working"
  aliases: ["bug"]
- name: "type: feature"
  color: "0075ca"
  description: "New feature request"
  aliases: ["enhancement", "feature"]
- name: "type: chore"
  color: "006b75"
  description: "Maintenance, refactoring, dependency updates"
  aliases: ["maintenance", "dependencies"]
- name: "type: docs"
  color: "0052cc"
  description: "Documentation improvements"
  aliases: ["documentation"]
- name: "priority: critical"
  color: "b60205"
  description: "Must fix immediately, blocking production"
- name: "priority: high"
  color: "d93f0b"
  description: "Important, address soon"
- name: "priority: low"
  color: "0e8a16"
  description: "Nice to have, no rush"
- name: "status: blocked"
  color: "fbca04"
  description: "Blocked by external dependency or decision"
  aliases: ["blocked"]
- name: "status: needs-info"
  color: "fef2c0"
  description: "Needs more information to proceed"
- name: "duplicate"
  color: "cfd3d7"
  description: "This issue or PR already exists"
- name: "wontfix"
  color: "eeeeee"
  description: "This will not be worked on"
  aliases: ["invalid"]
- name: "good first issue"
  color: "7057ff"
  description: "Good for newcomers"
- name: "help wanted"
  color: "008672"
  description: "Extra attention is needed"
- name: "security"
  color: "e11d48"
  description: "Security vulnerability or concern"
