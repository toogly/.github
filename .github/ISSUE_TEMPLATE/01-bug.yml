name: Bug Report
description: Report a bug or unexpected behavior
labels: ["type: bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      placeholder: A clear description of the bug
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run '...'
        2. See error
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options: [macOS, Linux, Windows]
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Toogly version
      placeholder: "e.g., v0.1.0"
    validations:
      required: true
  - type: input
    id: terminal
    attributes:
      label: Terminal emulator
      placeholder: "e.g., iTerm2, Alacritty, Windows Terminal"
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      render: shell
