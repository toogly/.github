name: Sync labels
on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * 1"

permissions:
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: EndBug/label-sync@v2
        with:
          config-file: https://raw.githubusercontent.com/toogly/.github/main/labels.yml
          delete-other-labels: false
          dry-run: false
